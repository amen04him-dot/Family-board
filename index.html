<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mendenhall Family Board</title>
<link href="https://fonts.googleapis.com/css?family=Nunito:400,700,800" rel="stylesheet" type="text/css">
<style>
/* ============================================================
   MENDENHALL FAMILY BOARD  v3 - bright + rewards
   Still built for a 2012 browser: no flexbox/grid, ES5 only.
   ============================================================ */
* { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
html, body { width:100%; }
body {
  background:#FDF8EC;
  color:#2B3240;
  font-family:'Nunito', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* ---------- Top bar ---------- */
#topbar {
  display:table; width:100%;
  background-color:#3FB8E8;
  background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%221200%22%20height%3D%22260%22%20viewBox%3D%220%200%201200%20260%22%20preserveAspectRatio%3D%22xMidYMax%20slice%22%3E%0A%3Cdefs%3E%0A%3ClinearGradient%20id%3D%22sky%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%0A%3Cstop%20offset%3D%220%22%20stop-color%3D%22%2357C9F2%22/%3E%0A%3Cstop%20offset%3D%220.65%22%20stop-color%3D%22%233FA9DE%22/%3E%0A%3Cstop%20offset%3D%221%22%20stop-color%3D%22%232E8FC7%22/%3E%0A%3C/linearGradient%3E%0A%3C/defs%3E%0A%3Crect%20width%3D%221200%22%20height%3D%22260%22%20fill%3D%22url%28%23sky%29%22/%3E%0A%3Ccircle%20cx%3D%221000%22%20cy%3D%2270%22%20r%3D%2270%22%20fill%3D%22%23FFE066%22%20opacity%3D%220.35%22/%3E%0A%3Ccircle%20cx%3D%221000%22%20cy%3D%2270%22%20r%3D%2246%22%20fill%3D%22%23FFDA4D%22/%3E%0A%3Cellipse%20cx%3D%22220%22%20cy%3D%2260%22%20rx%3D%2270%22%20ry%3D%2220%22%20fill%3D%22%23FFFFFF%22%20opacity%3D%220.75%22/%3E%0A%3Cellipse%20cx%3D%22275%22%20cy%3D%2248%22%20rx%3D%2250%22%20ry%3D%2216%22%20fill%3D%22%23FFFFFF%22%20opacity%3D%220.75%22/%3E%0A%3Cellipse%20cx%3D%22600%22%20cy%3D%22100%22%20rx%3D%2260%22%20ry%3D%2216%22%20fill%3D%22%23FFFFFF%22%20opacity%3D%220.55%22/%3E%0A%3Cellipse%20cx%3D%22810%22%20cy%3D%2245%22%20rx%3D%2245%22%20ry%3D%2213%22%20fill%3D%22%23FFFFFF%22%20opacity%3D%220.6%22/%3E%0A%3Cpath%20d%3D%22M80%20260%20V190%20Q80%20178%2092%20178%20Q104%20178%20104%20190%20V260%20Z%20M104%20215%20H126%20Q134%20215%20134%20205%20V185%20Q134%20177%20141%20177%20Q148%20177%20148%20185%20V208%20Q148%20229%20128%20229%20H104%20Z%20M80%20222%20H62%20Q52%20222%2052%20210%20V196%20Q52%20189%2045%20189%20Q38%20189%2038%20196%20V212%20Q38%20236%2060%20236%20H80%20Z%22%20fill%3D%22%232E7550%22%20opacity%3D%220.85%22/%3E%0A%3Cpath%20d%3D%22M1130%20260%20V200%20Q1130%20188%201141%20188%20Q1152%20188%201152%20200%20V260%20Z%20M1152%20224%20H1168%20Q1176%20224%201176%20214%20V198%20Q1176%20191%201182%20191%20Q1188%20191%201188%20198%20V218%20Q1188%20238%201170%20238%20H1152%20Z%22%20fill%3D%22%232E7550%22%20opacity%3D%220.8%22/%3E%0A%3Cpath%20d%3D%22M0%20260%20Q200%20244%20420%20252%20Q700%20260%20900%20250%20Q1080%20243%201200%20254%20V260%20Z%22%20fill%3D%22%232E7550%22%20opacity%3D%220.45%22/%3E%0A%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:center bottom;
  -webkit-background-size:cover;
  background-size:cover;
  color:#FFFFFF;
}
#dayname, #clock { text-shadow:0 1px 3px rgba(30,80,110,0.45); }
#verse, #fulldate, #weather { text-shadow:0 1px 2px rgba(30,80,110,0.4); }
#topbar .cell { display:table-cell; vertical-align:middle; padding:16px 22px; }
#daydate { width:32%; }
#dayname { font-size:38px; font-weight:800; line-height:1; color:#FFF3B8; }
#fulldate { font-size:17px; color:#DFF4FD; margin-top:4px; }
#versecell { width:44%; text-align:center; }
#verse { font-size:17px; font-style:italic; color:#FFFFFF; line-height:1.4; }
#verseref { font-size:12px; color:#D2EFFB; margin-top:4px; letter-spacing:2px; text-transform:uppercase; }
#clockcell { width:24%; text-align:right; }
#clock { font-size:46px; font-weight:800; letter-spacing:1px; color:#FFE066; }
#weather { font-size:17px; font-weight:800; color:#FFFFFF; margin-top:2px; }
#weather svg { vertical-align:-4px; margin-right:4px; }
#weather .hl { color:#D2EFFB; font-weight:700; }

/* ---------- Main columns ---------- */
#main { display:table; width:100%; table-layout:fixed; }
#choresCol { display:table-cell; width:58%; vertical-align:top; padding:16px 8px 8px 16px; }
#rightCol  { display:table-cell; width:42%; vertical-align:top; padding:16px 16px 8px 8px; }

.panelTitle {
  font-size:15px; font-weight:800; letter-spacing:2px;
  text-transform:uppercase;
  padding:0 4px 8px 4px; margin:0;
}
.tChores { color:#F0623A; }
.tMenu   { color:#12A88F; }
.tDad    { color:#F08A1D; }
.tEvents { color:#8E6FD8; }
.evRow { display:table; width:100%; border-bottom:1px solid #F5EEDC; }
.evRow .d { display:table-cell; width:56px; font-weight:800; font-size:16px; padding:9px 4px 9px 6px; color:#8E6FD8; }
.evRow .m { display:table-cell; font-size:17px; font-weight:700; padding:9px 6px 9px 2px; }
.evRow.today { background:#F1EAFE; border-radius:10px; border-bottom:none; }
.evRow.today .d { color:#F0623A; }
.evRow.last { border-bottom:none; }
.evEmpty { font-size:16px; color:#B4BAC5; padding:6px; font-weight:700; }

/* ---------- Cards ---------- */
.card {
  background:#FFFFFF;
  border-radius:16px;
  -webkit-box-shadow:0 2px 6px rgba(190,150,80,0.16);
  box-shadow:0 2px 6px rgba(190,150,80,0.16);
  margin-bottom:14px;
  padding:14px;
}

/* ---------- Person cards ---------- */
.personRow { border-top:6px solid #999; padding-top:12px; }
.personHead { display:table; width:100%; margin-bottom:10px; }
.personName { display:table-cell; font-size:23px; font-weight:800; }
.personAge  { font-size:13px; color:#A9B0BC; font-weight:400; }
.starRow { display:table-cell; text-align:right; font-size:22px; letter-spacing:3px; }
.starRow .on  { color:#FFB92E; }
.starRow .off { color:#E4E7EC; }
.treatBadge {
  display:inline-block; margin-top:2px;
  background:#FFF1C9; color:#A5720F; border:1px solid #FFDD87;
  font-size:14px; font-weight:800; border-radius:999px; padding:5px 12px;
}

.chip {
  display:inline-block; cursor:pointer;
  font-size:18px; line-height:1.2; font-weight:700;
  padding:11px 14px; margin:0 8px 8px 0;
  background:#FBF6EA; border:1px solid #F0E6CE;
  border-radius:999px;
  color:#2B3240;
}
.chip .box {
  display:inline-block; width:17px; height:17px;
  border:2px solid #D8CDB4; background:#FFFFFF;
  margin-right:8px; vertical-align:-2px; border-radius:50%;
  font-size:13px; line-height:15px; text-align:center; color:#FFFFFF; font-weight:800;
}
.chip.done { background:#E4F8E9; border-color:#B9EAC5; color:#8FA096; text-decoration:line-through; }
.chip.done .box { background:#3FC46B; border-color:#3FC46B; }

/* ---------- Menu ---------- */
.menuRow { display:table; width:100%; border-bottom:1px solid #F5EEDC; }
.menuRow .d { display:table-cell; width:56px; font-weight:800; font-size:16px; padding:9px 4px 9px 6px; color:#2FA9E0; }
.menuRow .mi { display:table-cell; width:34px; padding:6px 0; vertical-align:middle; }
.menuRow .m { display:table-cell; font-size:17px; font-weight:700; padding:9px 6px 9px 2px; }
.menuRow.today { background:#FFF4D6; border-radius:10px; border-bottom:none; }
.menuRow.today .d { color:#F0623A; }
.menuRow.today .m { font-weight:800; color:#9A6206; }
.menuRow.last { border-bottom:none; }

/* ---------- Dad's tasks ---------- */
#taskCard { border-top:6px solid #FF8A5C; }
.task {
  display:block; cursor:pointer;
  font-size:18px; font-weight:700; padding:12px 6px;
  border-bottom:1px solid #F5EEDC;
}
.task .box {
  display:inline-block; width:19px; height:19px;
  border:2px solid #FF8A5C; background:#FFFFFF;
  margin-right:10px; vertical-align:-3px; border-radius:6px;
  font-size:14px; line-height:16px; text-align:center; color:#FFFFFF; font-weight:800;
}
.task.done { color:#B4BAC5; text-decoration:line-through; }
.task.done .box { background:#FF8A5C; }
.task.last { border-bottom:none; }

#footerNote {
  text-align:center; font-size:12px;
  color:#C9BC9C; padding:6px 0 16px 0;
}

/* ---------- Celebration overlay ---------- */
#party {
  display:none; position:fixed; left:0; top:0; width:100%; height:100%;
  background:rgba(43,50,64,0.55); z-index:50; text-align:center;
}
#partyCard {
  position:relative; display:inline-block; margin-top:18%;
  background:#FFFFFF; border-radius:22px; padding:28px 40px;
  -webkit-box-shadow:0 8px 30px rgba(0,0,0,0.3);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  -webkit-animation:pop 0.5s ease-out;
}
#partyBig { font-size:44px; font-weight:800; color:#2B3240; }
#partySmall { font-size:20px; color:#8B94A3; margin-top:8px; font-weight:700; }
#partyStars { position:absolute; left:0; top:0; width:100%; height:100%; overflow:hidden; }
.pstar {
  position:absolute; top:105%;
  font-size:34px; color:#FFB92E;
  -webkit-animation-name:shoot;
  -webkit-animation-timing-function:ease-out;
  -webkit-animation-iteration-count:1;
  -webkit-animation-fill-mode:forwards;
}
@-webkit-keyframes shoot {
  0%   { top:105%; opacity:1; -webkit-transform:rotate(0deg)   scale(0.7); }
  70%  { opacity:1; }
  100% { top:-10%; opacity:0; -webkit-transform:rotate(360deg) scale(1.4); }
}
@-webkit-keyframes pop {
  0%   { -webkit-transform:scale(0.3); opacity:0; }
  70%  { -webkit-transform:scale(1.08); }
  100% { -webkit-transform:scale(1); opacity:1; }
}

/* ---------- Big screens (the wall tablet): fill it up ---------- */
@media (min-width: 700px) {
  #dayname { font-size:48px; }
  #fulldate { font-size:19px; }
  #verse { font-size:20px; }
  #verseref { font-size:13px; }
  #clock { font-size:54px; }
  #weather { font-size:19px; }
  #topbar .cell { padding:14px 24px; }
  .panelTitle { font-size:16px; padding-bottom:8px; }
  .card { padding:15px; margin-bottom:12px; border-radius:18px; }
  .personRow { border-top-width:7px; padding-top:11px; }
  .personName { font-size:28px; }
  .personAge { font-size:15px; }
  .starRow { font-size:25px; }
  .chip { font-size:21px; padding:12px 17px; margin:0 8px 8px 0; }
  .chip .box { width:20px; height:20px; font-size:14px; line-height:17px; }
  .menuRow .d, .evRow .d { font-size:18px; width:66px; padding:9px 5px 9px 7px; }
  .menuRow .m, .evRow .m { font-size:20px; padding:9px 7px 9px 3px; }
  .menuRow .mi { width:40px; }
  .menuRow .mi svg { width:29px; height:29px; }
  .task { font-size:21px; padding:12px 7px; }
  .task .box { width:22px; height:22px; font-size:15px; line-height:19px; }
  .evEmpty { font-size:18px; }
  #choresCol { padding:14px 8px 6px 16px; }
  #rightCol { padding:14px 16px 6px 8px; }
  #footerNote { font-size:13px; padding:4px 0 10px 0; }
}

/* ---------- Phone screens: stack the columns ---------- */
@media (max-width: 699px) {
  #main, #choresCol, #rightCol { display:block; width:100%; }
  #choresCol { padding:14px 14px 0 14px; }
  #rightCol  { padding:0 14px; }
  #topbar, #topbar .cell { display:block; width:100%; text-align:center; }
  #topbar .cell { padding:10px 16px; }
  #daydate, #versecell, #clockcell { width:100%; text-align:center; }
  #dayname { font-size:30px; }
  #clock { font-size:34px; }
  .chip { font-size:16px; }
  #partyBig { font-size:30px; }
  #partyCard { padding:20px 24px; margin-top:35%; }
}
</style>
</head>
<body>

<div id="topbar">
  <div class="cell" id="daydate">
    <div id="dayname">&nbsp;</div>
    <div id="fulldate">&nbsp;</div>
  </div>
  <div class="cell" id="versecell">
    <div id="verse"></div>
    <div id="verseref"></div>
  </div>
  <div class="cell" id="clockcell">
    <div id="clock">&nbsp;</div>
    <div id="weather"></div>
  </div>
</div>

<div id="main">
  <div id="choresCol">
    <div class="panelTitle tChores">Today's Chores &mdash; tap when done</div>
    <div id="choreList"></div>
  </div>
  <div id="rightCol">
    <div class="panelTitle tMenu">This Week's Menu</div>
    <div class="card" id="menuPanel"></div>
    <div class="panelTitle tEvents">This Week</div>
    <div class="card" id="eventPanel"></div>
    <div class="panelTitle tDad">Dad's List</div>
    <div class="card" id="taskCard"><div id="taskPanel"></div></div>
  </div>
</div>

<div id="footerNote">Chores + stars reset every Monday &bull; Finish all your chores in a day to earn a star &bull; <span id="resetWeek" style="text-decoration:underline; cursor:pointer;">Reset week</span></div>

<div id="party">
  <div id="partyStars"></div>
  <div id="partyCard">
    <div id="partyBig"></div>
    <div id="partySmall"></div>
  </div>
</div>

<script>
/* ============================================================
   EDIT YOUR FAMILY INFO HERE
   ============================================================ */
var CONFIG = {

  verse: "As for me and my house, we will serve the Lord.",
  verseRef: "Joshua 24:15",

  /* Reward system: finish ALL chores in a day = 1 star.
     Collect starGoal stars in a week = win a prize (you decide what!). */
  starGoal: 5,

  people: [
    { name:"Bella",     age:"10", color:"#FFC53D", nameColor:"#DF9C00",
      chores:["Make bed","Dishes after dinner","Feed the cat","Reading time"] },
    { name:"Charlotte", age:"6",  color:"#FF6FA5", nameColor:"#EF3D7F",
      chores:["Make bed","Set the table","Tidy toys"] },
    { name:"Avery",     age:"4",  color:"#4FC3F7", nameColor:"#1691D6",
      chores:["Toys in the bin","Clothes in hamper"] },
    { name:"Junior",    age:"2",  color:"#66D28A", nameColor:"#23A257",
      chores:["Toys in the bin (with help)"] }
  ],

  menu: {
    Mon: "Spaghetti and salad",
    Tue: "Tacos",
    Wed: "Chicken and rice",
    Thu: "Breakfast for dinner",
    Fri: "Pizza night",
    Sat: "Grill out",
    Sun: "Leftovers / easy night"
  },

  tasks: [
    "Pull chicken out of freezer",
    "Grocery run - see list on fridge",
    "Take trash cans to curb",
    "Water the back patio plants"
  ],

  /* Family events for the week: day is Mon/Tue/Wed/Thu/Fri/Sat/Sun */
  events: [
    { day:"Wed", text:"Example: dentist 3pm" }
  ],

  /* Weather location (find yours at latlong.net if you ever move) */
  weatherLat: 31.96,
  weatherLon: -110.96,

  /* OPTIONAL: paste a Google Sheet ID between the quotes to manage
     everything from your phone. Leave as "" to use the lists above. */
  sheetId: "19Mn-Blb4HYAcHK35T-r_WXBm8AHg3u3KXhI99XV247Y"
};

/* ============================================================
   Board code - no need to edit below this line
   ============================================================ */

function pad(n){ return n < 10 ? "0" + n : "" + n; }

var DAYS  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var DAYS3 = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var MONTHS = ["January","February","March","April","May","June","July",
              "August","September","October","November","December"];

function weekKey(){
  var d = new Date();
  var day = d.getDay();
  var diff = (day === 0) ? 6 : day - 1;
  var monday = new Date(d.getFullYear(), d.getMonth(), d.getDate() - diff);
  return "wk" + monday.getFullYear() + "-" + pad(monday.getMonth()+1) + "-" + pad(monday.getDate());
}
function dayKey(){
  var d = new Date();
  return "d" + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate());
}

function lsGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k, v); } catch(e){} }
function lsDel(k){ try { localStorage.removeItem(k); } catch(e){} }

function isChecked(id){ return lsGet(weekKey() + "_" + id) === "1"; }
function setChecked(id, on){
  if (on) lsSet(weekKey() + "_" + id, "1");
  else lsDel(weekKey() + "_" + id);
}

/* ---------- Stars ---------- */
function starCount(pi){
  var n = 0, i;
  for (i = 0; i < 7; i++){
    if (lsGet(weekKey() + "_star_p" + pi + "_" + i) === "1") n++;
  }
  return n;
}
function hasStarToday(pi){
  var dow = new Date().getDay();
  return lsGet(weekKey() + "_star_p" + pi + "_" + dow) === "1";
}
function giveStarToday(pi){
  var dow = new Date().getDay();
  lsSet(weekKey() + "_star_p" + pi + "_" + dow, "1");
}
function removeStarToday(pi){
  var dow = new Date().getDay();
  lsDel(weekKey() + "_star_p" + pi + "_" + dow);
}
function allChoresDone(pi){
  var j;
  for (j = 0; j < CONFIG.people[pi].chores.length; j++){
    if (!isChecked("c_" + pi + "_" + j)) return false;
  }
  return true;
}


/* ---------- Little food icons (drawn inline, no downloads needed) ---------- */
function svgWrap(inner){
  return '<svg width="26" height="26" viewBox="0 0 24 24" style="vertical-align:middle">' + inner + '</svg>';
}
function iconFor(text){
  var t = (text || "").toLowerCase();
  if (t.indexOf("pizza") >= 0)
    return svgWrap('<path d="M12 2 L22 20 L2 20 Z" fill="#F5C142" stroke="#D98829" stroke-width="1.5"/><circle cx="12" cy="12" r="1.7" fill="#E04B3A"/><circle cx="9" cy="16.5" r="1.7" fill="#E04B3A"/><circle cx="15" cy="16.5" r="1.7" fill="#E04B3A"/>');
  if (t.indexOf("taco") >= 0)
    return svgWrap('<path d="M2 18 A10 10 0 0 1 22 18 Z" fill="#F5C142" stroke="#D98829" stroke-width="1.5"/><path d="M5 17 Q8 13 12 15 Q16 17 19 14" fill="none" stroke="#5BAE4C" stroke-width="2"/>');
  if (t.indexOf("spaghetti") >= 0 || t.indexOf("pasta") >= 0 || t.indexOf("noodle") >= 0)
    return svgWrap('<path d="M3 13 A9 6 0 0 0 21 13 Z" fill="#F0F0F0" stroke="#C9C9C9" stroke-width="1.2"/><path d="M6 12 Q9 9 12 12 Q15 15 18 12" fill="none" stroke="#F5C142" stroke-width="2"/><circle cx="10" cy="11" r="1.6" fill="#E04B3A"/><circle cx="15" cy="12" r="1.6" fill="#E04B3A"/>');
  if (t.indexOf("chicken") >= 0 || t.indexOf("turkey") >= 0 || t.indexOf("wing") >= 0)
    return svgWrap('<ellipse cx="10" cy="10" rx="7" ry="6" fill="#D98829"/><rect x="14" y="12" width="7" height="3" rx="1.5" fill="#F0E6D2" transform="rotate(35 14 12)"/><circle cx="20" cy="17.5" r="2" fill="#F0E6D2"/>');
  if (t.indexOf("breakfast") >= 0 || t.indexOf("egg") >= 0 || t.indexOf("pancake") >= 0 || t.indexOf("waffle") >= 0)
    return svgWrap('<ellipse cx="12" cy="12" rx="9" ry="7.5" fill="#FFFFFF" stroke="#D9D2C2" stroke-width="1.2"/><circle cx="12" cy="12" r="3.6" fill="#F5B324"/>');
  if (t.indexOf("grill") >= 0 || t.indexOf("bbq") >= 0 || t.indexOf("burger") >= 0 || t.indexOf("steak") >= 0)
    return svgWrap('<path d="M12 3 Q16 8 13 11 Q17 10 17 15 A5 5 0 0 1 7 15 Q7 10 10 8 Q9 6 12 3 Z" fill="#F0703A"/><path d="M12 10 Q14 13 12 15 A2.4 2.4 0 0 1 9.8 15 Q9.6 12 12 10 Z" fill="#FFD449"/>');
  if (t.indexOf("fish") >= 0 || t.indexOf("shrimp") >= 0 || t.indexOf("salmon") >= 0)
    return svgWrap('<ellipse cx="10" cy="12" rx="7" ry="4.5" fill="#4FC3F7"/><path d="M16 12 L22 7 L22 17 Z" fill="#2FA9E0"/><circle cx="6.5" cy="11" r="1" fill="#1F3A4C"/>');
  if (t.indexOf("salad") >= 0 || t.indexOf("veggie") >= 0)
    return svgWrap('<path d="M3 13 A9 6 0 0 0 21 13 Z" fill="#8ED08B" stroke="#5BAE4C" stroke-width="1.2"/><circle cx="9" cy="11.5" r="1.6" fill="#E04B3A"/><circle cx="14.5" cy="11.5" r="1.6" fill="#F5B324"/>');
  if (t.indexOf("soup") >= 0 || t.indexOf("chili") >= 0 || t.indexOf("stew") >= 0)
    return svgWrap('<path d="M3 11 A9 7 0 0 0 21 11 Z" fill="#F0703A" stroke="#D14F22" stroke-width="1.2"/><path d="M8 8 Q8 6 9 5 M12 8 Q12 6 13 5 M16 8 Q16 6 17 5" fill="none" stroke="#B8B0A0" stroke-width="1.5"/>');
  if (t.indexOf("leftover") >= 0 || t.indexOf("easy") >= 0 || t.indexOf("your choice") >= 0)
    return svgWrap('<rect x="4" y="8" width="16" height="11" rx="2" fill="#9AD3F0" stroke="#5BA8CF" stroke-width="1.2"/><rect x="4" y="8" width="16" height="3.5" fill="#5BA8CF"/><rect x="10" y="5" width="4" height="3" rx="1" fill="#5BA8CF"/>');
  if (t.indexOf("rice") >= 0)
    return svgWrap('<path d="M3 12 A9 6.5 0 0 0 21 12 Z" fill="#5B7FBF" stroke="#42639E" stroke-width="1.2"/><ellipse cx="12" cy="10.5" rx="6" ry="3" fill="#FFFFFF"/>');
  /* default: fork + plate */
  return svgWrap('<circle cx="13" cy="12" r="7" fill="#F0F0F0" stroke="#C9C9C9" stroke-width="1.2"/><circle cx="13" cy="12" r="3.6" fill="#E4E4E4"/><path d="M4 4 V10 M2.6 4 V8 M5.4 4 V8 M4 10 V20" stroke="#9AA5B5" stroke-width="1.6" fill="none"/>');
}

/* ---------- Celebration ---------- */
var partyTimer = null;
function celebrate(big, small){
  var i, wrap = document.getElementById("partyStars");
  var html = "";
  for (i = 0; i < 26; i++){
    var left = Math.floor(Math.random() * 96);
    var dur  = (1.4 + Math.random() * 1.8).toFixed(2);
    var delay = (Math.random() * 1.2).toFixed(2);
    var size = 22 + Math.floor(Math.random() * 30);
    var col = ["#FFB92E","#FF6FA5","#4FC3F7","#66D28A","#FF8A5C"][i % 5];
    html += '<span class="pstar" style="left:' + left + '%; font-size:' + size +
            'px; color:' + col + '; -webkit-animation-duration:' + dur +
            's; -webkit-animation-delay:' + delay + 's;">&#9733;</span>';
  }
  wrap.innerHTML = html;
  document.getElementById("partyBig").innerHTML = big;
  document.getElementById("partySmall").innerHTML = small;
  var p = document.getElementById("party");
  p.style.display = "block";
  if (partyTimer) clearTimeout(partyTimer);
  partyTimer = setTimeout(hideParty, 5000);
}
function hideParty(){
  document.getElementById("party").style.display = "none";
  document.getElementById("partyStars").innerHTML = "";
}

/* ---------- Toggling ---------- */
function toggle(el, id){
  var on = !(el.className.indexOf("done") >= 0);
  setChecked(id, on);
  if (on) { el.className = el.className + " done"; }
  else    { el.className = el.className.replace(" done",""); }

  /* Chore chips look like c_PI_J : award or take back a star */
  if (id.charAt(0) === "c"){
    var pi = parseInt(id.split("_")[1], 10);
    if (!on){
      /* Unchecked a chore: if today's star was earned but chores are
         no longer all done, remove today's star */
      if (hasStarToday(pi) && !allChoresDone(pi)){
        removeStarToday(pi);
        renderBoard();
      }
      return;
    }
    if (allChoresDone(pi) && !hasStarToday(pi)){
      giveStarToday(pi);
      var p = CONFIG.people[pi];
      var stars = starCount(pi);
      if (stars >= CONFIG.starGoal){
        celebrate(p.name + " earned a prize!", "&#9733; " + stars + " stars this week! Amazing!");
      } else {
        var left = CONFIG.starGoal - stars;
        celebrate("Way to go, " + p.name + "!", "Star earned! " + left + " more to win a prize!");
      }
      renderBoard();
    }
  }
}

function renderClock(){
  var d = new Date();
  var h = d.getHours();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  document.getElementById("clock").innerHTML = h + ":" + pad(d.getMinutes()) + " " + ampm;
  document.getElementById("dayname").innerHTML = DAYS[d.getDay()];
  document.getElementById("fulldate").innerHTML = MONTHS[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}

function starRowHtml(pi){
  var html = '<span class="starRow">';
  var count = starCount(pi);
  var i;
  for (i = 0; i < CONFIG.starGoal; i++){
    html += '<span class="' + (i < count ? "on" : "off") + '">&#9733;</span>';
  }
  html += '</span>';
  return html;
}

function renderBoard(){
  var i, j, html;

  document.getElementById("verse").innerHTML = CONFIG.verse;
  document.getElementById("verseref").innerHTML = CONFIG.verseRef;

  /* Chores */
  html = "";
  for (i = 0; i < CONFIG.people.length; i++){
    var p = CONFIG.people[i];
    html += '<div class="card personRow" style="border-top-color:' + p.color + '">';
    html += '<div class="personHead"><span class="personName" style="color:' +
            (p.nameColor || p.color) + '">' + p.name +
            ' <span class="personAge">age ' + p.age + '</span></span>' +
            starRowHtml(i) + '</div>';
    if (starCount(i) >= CONFIG.starGoal){
      html += '<div><span class="treatBadge">&#9733; Prize earned this week!</span></div>';
    }
    for (j = 0; j < p.chores.length; j++){
      var cid = "c_" + i + "_" + j;
      var done = isChecked(cid) ? " done" : "";
      html += '<span class="chip' + done + '" id="' + cid + '">' +
              '<span class="box">&#10003;</span>' + p.chores[j] + '</span>';
    }
    html += '</div>';
  }
  document.getElementById("choreList").innerHTML = html;

  /* Menu */
  var todayName = DAYS3[new Date().getDay()];
  var order = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  html = "";
  for (i = 0; i < order.length; i++){
    var cls = "menuRow";
    if (order[i] === todayName) cls += " today";
    if (i === order.length - 1) cls += " last";
    var meal = CONFIG.menu[order[i]] || "&mdash;";
    html += '<div class="' + cls + '"><span class="d">' + order[i] + '</span>' +
            '<span class="mi">' + iconFor(meal) + '</span>' +
            '<span class="m">' + meal + '</span></div>';
  }
  document.getElementById("menuPanel").innerHTML = html;

  /* Events */
  html = "";
  if (!CONFIG.events || CONFIG.events.length === 0){
    html = '<div class="evEmpty">Nothing scheduled this week</div>';
  } else {
    for (i = 0; i < CONFIG.events.length; i++){
      var ev = CONFIG.events[i];
      var ecls = "evRow";
      if (ev.day && ev.day.substring(0,3) === todayName) ecls += " today";
      if (i === CONFIG.events.length - 1) ecls += " last";
      html += '<div class="' + ecls + '"><span class="d">' + (ev.day || "") + '</span>' +
              '<span class="m">' + ev.text + '</span></div>';
    }
  }
  document.getElementById("eventPanel").innerHTML = html;

  /* Tasks */
  html = "";
  for (i = 0; i < CONFIG.tasks.length; i++){
    var tid = "t_" + i;
    var tdone = isChecked(tid) ? " done" : "";
    var last = (i === CONFIG.tasks.length - 1) ? " last" : "";
    html += '<span class="task' + tdone + last + '" id="' + tid + '">' +
            '<span class="box">&#10003;</span>' + CONFIG.tasks[i] + '</span>';
  }
  document.getElementById("taskPanel").innerHTML = html;

  attachTaps();
}

function attachTaps(){
  var i, j;
  for (i = 0; i < CONFIG.people.length; i++){
    for (j = 0; j < CONFIG.people[i].chores.length; j++){
      bindTap("c_" + i + "_" + j);
    }
  }
  for (i = 0; i < CONFIG.tasks.length; i++){ bindTap("t_" + i); }
  document.getElementById("party").onclick = hideParty;
  document.getElementById("resetWeek").onclick = doReset;
}
function bindTap(id){
  var el = document.getElementById(id);
  if (!el) return;
  el.onclick = function(){ toggle(el, id); };
}

/* ---------- Optional Google Sheet loading (JSONP, old-browser safe) ----------
   One row per item, first column says what it is:
     verse   | text                | reference
     menu    | Mon (or Tue, etc.)  | what's for dinner
     chore   | person's name       | the chore
     task    |                     | Brandon's task                  */
function loadSheet(){
  if (!CONFIG.sheetId) return;
  window.google = window.google || {};
  google.visualization = google.visualization || {};
  google.visualization.Query = google.visualization.Query || {};
  google.visualization.Query.setResponse = handleSheet;
  var s = document.createElement("script");
  s.src = "https://docs.google.com/spreadsheets/d/" + CONFIG.sheetId +
          "/gviz/tq?tqx=out:json&headers=0&t=" + new Date().getTime();
  document.body.appendChild(s);
}
function cellVal(row, i){
  if (!row.c || !row.c[i] || row.c[i].v === null || row.c[i].v === undefined) return "";
  return "" + row.c[i].v;
}
function handleSheet(resp){
  try {
    if (!resp || !resp.table || !resp.table.rows) return;
    var rows = resp.table.rows;
    var newMenu = {}, newTasks = [], gotMenu = false, gotTasks = false;
    var choresByName = {}, gotChores = false;
    var newEvents = [], gotEvents = false;
    var i;
    for (i = 0; i < rows.length; i++){
      var kind = cellVal(rows[i], 0).toLowerCase();
      var a = cellVal(rows[i], 1);
      var b = cellVal(rows[i], 2);
      if (kind === "verse" && a){ CONFIG.verse = a; CONFIG.verseRef = b; }
      else if (kind === "menu" && a){ newMenu[a.substring(0,3)] = b; gotMenu = true; }
      else if (kind === "task" && (a || b)){ newTasks.push(b || a); gotTasks = true; }
      else if (kind === "chore" && a && b){
        if (!choresByName[a]) choresByName[a] = [];
        choresByName[a].push(b); gotChores = true;
      }
      else if (kind === "event" && b){
        newEvents.push({ day:a, text:b }); gotEvents = true;
      }
    }
    if (gotEvents) CONFIG.events = newEvents;
    else if (CONFIG.sheetId) CONFIG.events = [];
    if (gotMenu)  CONFIG.menu  = newMenu;
    if (gotTasks) CONFIG.tasks = newTasks;
    if (gotChores){
      for (i = 0; i < CONFIG.people.length; i++){
        var nm = CONFIG.people[i].name;
        if (choresByName[nm]) CONFIG.people[i].chores = choresByName[nm];
      }
    }
    renderBoard();
  } catch(e){}
}


/* ---------- Weather (Open-Meteo, free, no account needed) ---------- */
var wxTries = 0;
function wxRetry(){
  if (wxTries >= 3) return;
  wxTries++;
  setTimeout(loadWeather, 20000);
}
function wxText(code){
  if (code === 0) return "Sunny";
  if (code === 1) return "Mostly sunny";
  if (code === 2) return "Partly cloudy";
  if (code === 3) return "Cloudy";
  if (code === 45 || code === 48) return "Foggy";
  if (code >= 51 && code <= 57) return "Drizzle";
  if (code >= 61 && code <= 67) return "Rain";
  if (code >= 71 && code <= 77) return "Snow";
  if (code >= 80 && code <= 82) return "Showers";
  if (code >= 95) return "Storms";
  return "";
}
function wxIcon(code){
  var sun = '<circle cx="12" cy="12" r="5" fill="#FFE066"/><path d="M12 2 V5 M12 19 V22 M2 12 H5 M19 12 H22 M4.9 4.9 L7 7 M17 17 L19.1 19.1 M19.1 4.9 L17 7 M7 17 L4.9 19.1" stroke="#FFE066" stroke-width="2"/>';
  var cloud = '<path d="M7 18 A4 4 0 0 1 8 10 A5.5 5.5 0 0 1 18.5 12 A3.5 3.5 0 0 1 18 18 Z" fill="#EAF4FA"/>';
  var inner;
  if (code === 0 || code === 1) inner = sun;
  else if (code === 2) inner = '<circle cx="9" cy="9" r="4" fill="#FFE066"/>' + cloud;
  else if (code === 3 || code === 45 || code === 48) inner = cloud;
  else if (code >= 51 && code <= 82) inner = cloud + '<path d="M9 19 L8 22 M13 19 L12 22 M17 19 L16 22" stroke="#9AD3F0" stroke-width="2"/>';
  else if (code >= 95) inner = cloud + '<path d="M12 18 L10 22 L13 21 L11.5 24" stroke="#FFE066" stroke-width="2" fill="none"/>';
  else inner = sun;
  return '<svg width="22" height="22" viewBox="0 0 24 24">' + inner + '</svg>';
}
function loadWeather(){
  try {
    var url = "https://api.open-meteo.com/v1/forecast?latitude=" + CONFIG.weatherLat +
              "&longitude=" + CONFIG.weatherLon +
              "&current=temperature_2m,weather_code" +
              "&current_weather=true" +
              "&daily=temperature_2m_max,temperature_2m_min" +
              "&temperature_unit=fahrenheit&timezone=auto";
    var xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onreadystatechange = function(){
      if (xhr.readyState !== 4) return;
      if (xhr.status !== 200) { wxRetry(); return; }
      try {
        var d = JSON.parse(xhr.responseText);
        var t, code;
        if (d.current){
          t = Math.round(d.current.temperature_2m);
          code = d.current.weather_code;
        } else if (d.current_weather){
          t = Math.round(d.current_weather.temperature);
          code = d.current_weather.weathercode;
        } else { return; }
        var hi = Math.round(d.daily.temperature_2m_max[0]);
        var lo = Math.round(d.daily.temperature_2m_min[0]);
        document.getElementById("weather").innerHTML =
          wxIcon(code) + t + "&deg; " + wxText(code) +
          ' <span class="hl">&nbsp;H ' + hi + '&deg; / L ' + lo + '&deg;</span>';
        wxTries = 0;
      } catch(e){ wxRetry(); }
    };
    xhr.send(null);
  } catch(e){}
}


/* ---------- Two-tap reset (no popup dialogs, works everywhere) ---------- */
var resetArmed = false;
var resetTimer = null;
function doReset(){
  var el = document.getElementById("resetWeek");
  if (!resetArmed){
    resetArmed = true;
    el.innerHTML = "Tap again to erase all stars + checkmarks";
    el.style.color = "#E04B3A";
    el.style.fontWeight = "800";
    if (resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(function(){
      resetArmed = false;
      el.innerHTML = "Reset week";
      el.style.color = "";
      el.style.fontWeight = "";
    }, 6000);
    return;
  }
  /* Second tap: wipe every saved checkmark and star (all weeks) */
  resetArmed = false;
  if (resetTimer) clearTimeout(resetTimer);
  var keys = [], i;
  try {
    for (i = 0; i < localStorage.length; i++){
      var k = localStorage.key(i);
      if (k && k.indexOf("wk") === 0) keys.push(k);
    }
    for (i = 0; i < keys.length; i++) localStorage.removeItem(keys[i]);
  } catch(e){}
  el.innerHTML = "Reset week";
  el.style.color = "";
  el.style.fontWeight = "";
  renderBoard();
}

/* ---------- Start ---------- */
renderClock();
renderBoard();
loadSheet();
loadWeather();
/* Nudge old browsers to hide their address bar */
setTimeout(function(){ try { window.scrollTo(0, 1); } catch(e){} }, 400);
setInterval(renderClock, 15000);
setInterval(loadSheet, 5 * 60 * 1000);
setInterval(loadWeather, 30 * 60 * 1000);
setInterval(function(){ window.location.reload(); }, 12 * 60 * 60 * 1000);
</script>
